<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS/Articulo.css" />
    <title>RUIDO BLANCO</title>
  </head>
  <body>
    <!--HEADER-->
    <header>
      <!--NAVBAR REUTILIZABLE-->
      <nav class="navbar navbar-expand-lg colorBase navbar-scroll">
        <div class="container-fluid">
          <!-- LOGO + TITULO -->
          <a class="navbar-brand d-flex align-items-center" href="home.html">
            <img
              src="/Imagenes/LOGO_RB.png"
              alt="Logo"
              width="40"
              height="40"
              class="me-2"
            />

            <span class="logo-font">RUIDO BLANCO</span>
          </a>

          <!-- BOTON RESPONSIVE -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- CONTENIDO -->
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <!-- BUSCADOR CENTRADO -->
            <form class="d-flex mx-auto" role="search">
              <input
                class="form-control me-2 controlLargoBuscador"
                type="search"
                placeholder="Buscar..."
              />
              <button class="btn btnSearch" type="submit">Buscar</button>
            </form>
            <button
              class="btn btnSearch"
              onclick="window.location.href = '/HOME/home.html'"
            >
              Volver a Home
            </button>

            <!--ARTICULOS DROPDOWN-->
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle movement"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                >
                  ARTICULOS
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">SOCIAL</a></li>
                  <li><a class="dropdown-item" href="#">INAU</a></li>
                  <li><a class="dropdown-item" href="#">FEMINISMO</a></li>
                  <li><a class="dropdown-item" href="#">LGBTQ+</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <div id="articulo"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="/ARTICULO/articulo.js/articulo.js"></script>
  </body>
</html>
