<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/" />
    <title>Ruido Blanco</title>
  </head>
  <body>
    <!--HEADER-->
    <header>
      <!--NAVBAR-->
      <nav class="navbar navbar-expand-lg bg-body-tertiary Navbar ">
        <div class="container-fluid">
          <!-- LOGO + TITULO -->
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img
              src="css/img/advertencia.png"
              alt="Logo"
              width="40"
              height="40"
              class="me-2"
            />

            RUIDO BLANCO
          </a>

          <!-- BOTON RESPONSIVE -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- CONTENIDO -->
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <!-- BUSCADOR-->
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Buscar..."
              />

              <button class="btn btn-outline-success" type="submit">
                Buscar
              </button>
            </form>
            <!-- MENU -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" href="#"> Home </a>
              </li>
            </ul>
            <!-- DROPDOWN -->
            <ul>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                >
                  ARTICULOS
                </a>

                <ul class="dropdown-menu Dropmenu">
                  <li><a class="dropdown-item" href="#">SOCIAL</a></li>
                  <li><a class="dropdown-item" href="#">INAU</a></li>
                  <li><a class="dropdown-item" href="#">FEMINISMO</a></li>
                  <li><a class="dropdown-item" href="#">LGTBQ+</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
